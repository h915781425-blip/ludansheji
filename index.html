<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>百家乐智能公式提示器</title>
  
  <script src="https://registry.npmmirror.com/vue/3.3.4/files/dist/vue.global.prod.js"></script>
  
  <style>
    [v-cloak] { display: none !important; }
    :root { --rpx: 0.1333vw; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    html, body { 
      background-color: #0b1c14;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
      height: 100%; width: 100%; overflow: hidden; position: fixed; top: 0; left: 0;
    }

    .table-container { 
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle, #2E8B57 0%, #0B3B17 100%);
      display: flex; flex-direction: column; color: white; overflow: hidden;
      padding-top: max(2vh, env(safe-area-inset-top, 20px));
    }

    /* 顶部标题栏 */
    .top-header {
      text-align: center; font-size: 5vw; font-weight: bold; color: #FFD700;
      padding: 1vh 0 2vh 0; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }

    /* 路单面板 */
    .macau-roads-panel-clean {
      flex: 1 1 auto;
      margin: 0 2vw 1vh 2vw; background-color: #ffffff; border: 2px solid #FFD700; border-radius: 1.5vw;
      padding: 0.5vh 1vw; color: #333; overflow: hidden;
      display: flex; flex-direction: column;
    }
    
    .roads-scroll-view { width: 100%; flex: 1; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
    .roads-scroll-content { display: inline-block; height: 100%; vertical-align: top; }
    .road-title-strip { font-size: 3vw; font-weight: bold; color: #777; padding-left: 1vw; padding-top: 1vh;}
    .road-title-strip-gold { font-size: 3vw; font-weight: bold; color: #b8860b; padding-left: 1vw; border-top: 1px dashed #ccc; margin-top: 1vh; padding-top: 1vh;}

    .bead-row-container, .bigroad-row-container { 
      height: calc(50% - 3vh); display: flex; flex-direction: row; 
      background: #fff; border-top: 1px solid #e0e0e0; border-left: 1px solid #e0e0e0;
    }
    .bead-column-unit, .bigroad-column-unit { display: flex; flex-direction: column; width: 6vw; height: 100%; }
    .bead-cell-unit, .bigroad-cell-unit { 
      flex: 1; border-right: 1px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; 
      display: flex; justify-content: center; align-items: center; box-sizing: border-box; 
    }
    .bead-ball-unit { width: 4.5vw; height: 4.5vw; border-radius: 50%; font-size: 2.5vw; font-weight: bold; color: white; display: flex; justify-content: center; align-items: center; }
    .bigroad-circle-unit { width: 4vw; height: 4vw; border-radius: 50%; border: 2px solid transparent; position: relative; }

    .bg-banker { background-color: #d90000; }
    .bg-player { background-color: #1E90FF; }
    .bg-tie { background-color: #32CD32; }
    .b-banker { border-color: #d90000; }
    .b-player { border-color: #1E90FF; }
    .t-slash { position: absolute; color: #32CD32; font-size: 3vw; font-weight: bold; top: -20%; left: 10%; transform: scaleX(1.3); }

    /* 【新增】智能公式提示条 */
    .formula-tracker-bar {
      margin: 0 2vw 1vh 2vw; height: 6vh; border-radius: 1.5vw;
      display: flex; align-items: center; justify-content: center;
      font-size: 3.8vw; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.4);
      transition: all 0.3s ease;
    }
    .tracker-idle { background-color: rgba(0,0,0,0.6); color: #aaa; border: 1px dashed #777; }
    .tracker-running { background: linear-gradient(90deg, #4b0082, #000000, #4b0082); color: #FFD700; border: 2px solid #FFD700; animation: pulseGlow 1.5s infinite alternate; }
    .tracker-won { background-color: #2E8B57; color: white; border: 2px solid #32CD32; }
    .tracker-lost { background-color: #8B0000; color: white; border: 2px solid #FF4500; }
    
    .text-red { color: #ff4d4d; font-size: 4.5vw; margin: 0 1vw; }
    .text-blue { color: #4da6ff; font-size: 4.5vw; margin: 0 1vw; }

    @keyframes pulseGlow { 0% { box-shadow: 0 0 5px #FFD700; } 100% { box-shadow: 0 0 15px #FFD700; } }

    /* 底部录入与公式控制台 */
    .bottom-designer-deck { 
      flex-shrink: 0; padding: 2vh 4vw max(2vh, env(safe-area-inset-bottom, 15px)) 4vw;
      background-color: rgba(0, 0, 0, 0.85); border-top: 2px solid #FFD700; border-radius: 3vw 3vw 0 0;
    }
    
    .formula-controls { display: flex; justify-content: space-between; gap: 3vw; margin-bottom: 2vh; }
    .btn-f-start { flex: 1; background-color: #FFD700; color: #000; border: none; padding: 1.2vh 0; border-radius: 1.5vw; font-size: 3.5vw; font-weight: 900; cursor: pointer; }
    .btn-f-select { flex: 1.5; background-color: #333; color: #FFD700; border: 1px solid #FFD700; padding: 1.2vh 0; border-radius: 1.5vw; font-size: 3.2vw; font-weight: bold; cursor: pointer; }
    .btn-f-stop { flex: 1; background-color: #ff4d4d; color: #fff; border: none; padding: 1.2vh 0; border-radius: 1.5vw; font-size: 3.5vw; font-weight: 900; cursor: pointer; }

    .action-grid { display: flex; justify-content: space-between; gap: 3vw; margin-bottom: 2vh; }
    .btn-record { flex: 1; height: 13vw; border: none; border-radius: 2vw; font-size: 4.5vw; font-weight: bold; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); transition: transform 0.1s; }
    .btn-record:active { transform: scale(0.95); }
    
    .sub-action-grid { display: flex; justify-content: space-between; gap: 3vw; }
    .btn-sub { flex: 1; padding: 1.2vh 0; border: none; border-radius: 1.5vw; font-size: 3.5vw; font-weight: bold; cursor: pointer; background-color: #555; color: white; }
    .btn-clear { background-color: #B22222; }

    /* 【新增】公式选择下拉弹窗 */
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: flex; justify-content: center; align-items: center; }
    .modal-content { background: #222; border: 2px solid #FFD700; border-radius: 2vw; width: 85vw; padding: 2vh 4vw; color: white; }
    .modal-title { font-size: 4.5vw; font-weight: bold; text-align: center; margin-bottom: 2vh; color: #FFD700; }
    .formula-item { padding: 1.5vh 3vw; background: #333; margin-bottom: 1.5vh; border-radius: 1.5vw; font-size: 3.5vw; display: flex; flex-direction: column; gap: 0.5vh; border: 1px solid transparent; }
    .formula-item-active { border-color: #FFD700; background: rgba(255,215,0,0.1); }
    .f-name { font-weight: bold; font-size: 3.8vw; }
    .f-detail { color: #aaa; font-size: 3vw; }
    .modal-close { width: 100%; background: #555; color: white; border: none; padding: 1.5vh 0; border-radius: 1.5vw; font-size: 3.8vw; margin-top: 1vh; font-weight: bold; }

  </style>
</head>
<body>

<div id="app" class="table-container" v-cloak>
  
  <div class="top-header">公式打分提示器</div>

  <div class="macau-roads-panel-clean">
    <div class="roads-scroll-view" ref="roadsScroll">
      <div class="roads-scroll-content">
        <div class="road-title-strip">珠盘路</div>
        <div class="bead-row-container">
          <div class="bead-column-unit" v-for="(col, cIndex) in displayBeadPlate" :key="'bead-'+cIndex">
            <div class="bead-cell-unit" v-for="(cell, rIndex) in col" :key="'bead-cell-'+rIndex">
              <div class="bead-ball-unit" :class="cell === 'banker' ? 'bg-banker' : (cell === 'player' ? 'bg-player' : (cell === 'tie' ? 'bg-tie' : ''))">
                <span v-if="cell !== 'empty'">{{cell === 'banker' ? '庄' : (cell === 'player' ? '闲' : '和')}}</span>
              </div>
            </div>
          </div>
        </div>

        <div class="road-title-strip-gold">大路</div>
        <div class="bigroad-row-container">
          <div class="bigroad-column-unit" v-for="(col, cIndex) in displayBigRoad" :key="'big-'+cIndex">
            <div class="bigroad-cell-unit" v-for="(cell, rIndex) in col" :key="'big-cell-'+rIndex">
              <div class="bigroad-circle-unit" v-if="cell.winner !== 'empty'" :class="cell.winner === 'banker' ? 'b-banker' : (cell.winner === 'player' ? 'b-player' : '')">
                <span class="t-slash" v-if="cell.hasTie">/</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="formula-tracker-bar" :class="trackerClass">
    <span v-if="formulaStatus === 'idle'">按“开始公式”捕捉切入点</span>
    <span v-else-if="formulaStatus === 'running'">
      第{{currentStep + 1}}口：买<span :class="targetSide === 'banker' ? 'text-red' : 'text-blue'">{{targetSide === 'banker' ? '庄' : '闲'}}</span>，注码 [ {{currentProgression}} ]
    </span>
    <span v-else-if="formulaStatus === 'won'">🎉 命中收米！等待下个切入点</span>
    <span v-else-if="formulaStatus === 'lost'">❌ 缆断了，重新寻找路子</span>
  </div>

  <div class="bottom-designer-deck">
    
    <div class="formula-controls">
      <button v-if="formulaStatus === 'running'" class="btn-f-stop" @click="stopFormula">⏹ 停止执行</button>
      <button v-else class="btn-f-start" @click="startFormula">▶️ 开始公式</button>
      
      <button class="btn-f-select" @touchstart="handleFormulaSelectTap" @click="handleFormulaSelectClick">
        ⚙️ {{ activeFormula.name }}
      </button>
    </div>

    <div class="action-grid">
      <button class="btn-record bg-player" @click="addRecord('player')">闲 PLAYER</button>
      <button class="btn-record bg-tie" @click="addRecord('tie')">和 TIE</button>
      <button class="btn-record bg-banker" @click="addRecord('banker')">庄 BANKER</button>
    </div>
    
    <div class="sub-action-grid">
      <button class="btn-sub" @click="undoRecord">↩ 撤销上一步</button>
      <button class="btn-sub btn-clear" @click="clearRecords">🗑 清空路图</button>
    </div>
  </div>

  <div class="modal-overlay" v-if="showFormulaModal" @click.self="showFormulaModal = false">
    <div class="modal-content">
      <div class="modal-title">选择打法公式</div>
      <div class="formula-item" v-for="f in formulas" :key="f.id" :class="{'formula-item-active': activeFormulaId === f.id}" @click="selectFormula(f.id)">
        <span class="f-name">{{ f.name }}</span>
        <span class="f-detail">方向: {{ getDirText(f.dirs) }}</span>
        <span class="f-detail">注码: {{ f.prog.join(' - ') }}</span>
      </div>
      <button class="modal-close" @click="showFormulaModal = false">关闭 (已选定)</button>
    </div>
  </div>

</div>

<script>
const { createApp } = Vue;

createApp({
  data() {
    return {
      rawHistory: [],
      displayBeadPlate: [],
      displayBigRoad: [],
      
      // 公式引擎核心数据
      formulas: [
        { 
          id: 'jump_5', 
          name: '五式单跳缆 (专属)', 
          prog: [1, 3, 7, 15, 32], 
          dirs: ['banker', 'player', 'banker', 'player', 'banker'] 
        },
        { 
          id: 'long_b_5', 
          name: '五式长庄缆 (打连)', 
          prog: [1, 2, 4, 8, 16], 
          dirs: ['banker', 'banker', 'banker', 'banker', 'banker'] 
        },
        { 
          id: 'long_p_5', 
          name: '五式长闲缆 (打连)', 
          prog: [1, 2, 4, 8, 16], 
          dirs: ['player', 'player', 'player', 'player', 'player'] 
        }
      ],
      activeFormulaId: 'jump_5',
      formulaStatus: 'idle', // idle, running, won, lost
      currentStep: 0,
      
      // UI交互
      showFormulaModal: false,
      lastTapTime: 0,
      tapTimer: null
    }
  },
  computed: {
    activeFormula() {
      return this.formulas.find(f => f.id === this.activeFormulaId);
    },
    targetSide() {
      return this.activeFormula.dirs[this.currentStep];
    },
    currentProgression() {
      return this.activeFormula.prog[this.currentStep];
    },
    trackerClass() {
      return `tracker-${this.formulaStatus}`;
    }
  },
  mounted() {
    this.resetAllRoadMatrix();
  },
  methods: {
    // 翻译方向数组用于UI展示
    getDirText(dirs) {
      return dirs.map(d => d === 'banker' ? '庄' : '闲').join(' ');
    },
    
    // 【新增】移动端防抖双击判定
    handleFormulaSelectTap(e) {
      const currentTime = new Date().getTime();
      const tapLength = currentTime - this.lastTapTime;
      if (tapLength < 350 && tapLength > 0) {
        // 双击成功
        clearTimeout(this.tapTimer);
        this.showFormulaModal = true;
      } else {
        // 单击提示（可选）
        this.tapTimer = setTimeout(() => {
          this.showToast('请快速双击打开菜单');
        }, 350);
      }
      this.lastTapTime = currentTime;
    },
    // PC端兼容点击
    handleFormulaSelectClick(e) {
      if(e.detail === 2) { this.showFormulaModal = true; }
    },

    selectFormula(id) {
      this.activeFormulaId = id;
      this.formulaStatus = 'idle';
      this.currentStep = 0;
      this.showFormulaModal = false;
    },

    startFormula() {
      this.formulaStatus = 'running';
      this.currentStep = 0;
    },

    stopFormula() {
      this.formulaStatus = 'idle';
      this.currentStep = 0;
    },

    showToast(msg) {
      const toast = document.createElement('div');
      toast.textContent = msg;
      toast.style.cssText = 'position:fixed;top:45%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.85);color:#FFD700;padding:2vw 4vw;border-radius:1.5vw;font-size:3.5vw;z-index:9999;font-weight:bold;white-space:nowrap;';
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; }, 1000);
      setTimeout(() => { document.body.removeChild(toast); }, 1300);
    },

    // 【修改】录入结果时加入公式裁判逻辑
    addRecord(result) {
      // 如果公式正在执行中，先结算状态
      if (this.formulaStatus === 'running') {
        if (result === 'tie') {
          // 和局：不计入胜负，步数不变
        } else if (result === this.targetSide) {
          // 命中！
          this.formulaStatus = 'won';
        } else {
          // 未命中，进入下一阶
          this.currentStep++;
          if (this.currentStep >= this.activeFormula.prog.length) {
            // 缆断了
            this.formulaStatus = 'lost';
          }
        }
      } else if (this.formulaStatus === 'won' || this.formulaStatus === 'lost') {
        // 如果是在出结果后继续录入，自动复位公式回到待机
        this.formulaStatus = 'idle';
      }

      // 录入路单逻辑
      this.rawHistory.push(result);
      this.updateRoads();
    },

    undoRecord() {
      if (this.rawHistory.length > 0) {
        this.rawHistory.pop();
        this.updateRoads();
        // 撤销时，保险起见重置公式状态
        this.formulaStatus = 'idle';
        this.currentStep = 0;
      }
    },

    clearRecords() {
      this.rawHistory = [];
      this.formulaStatus = 'idle';
      this.currentStep = 0;
      this.resetAllRoadMatrix();
    },

    // 矩阵初始化与更新逻辑
    resetAllRoadMatrix() {
      let beadMatrix = [];
      for(let c=0; c<20; c++) { let col = []; for(let r=0; r<6; r++) col.push('empty'); beadMatrix.push(col); }
      let bigMatrix = [];
      for (let c = 0; c < 40; c++) { let col = []; for (let r = 0; r < 6; r++) col.push({ winner: 'empty', hasTie: false }); bigMatrix.push(col); }
      this.displayBeadPlate = beadMatrix; this.displayBigRoad = bigMatrix;
      this.$nextTick(() => { if(this.$refs.roadsScroll) this.$refs.roadsScroll.scrollLeft = 0; });
    },

    updateRoads() {
      if (this.rawHistory.length === 0) {
        this.resetAllRoadMatrix();
        return;
      }
      let roadsData = this.generatePureMacauRoads(this.rawHistory);
      this.displayBeadPlate = roadsData.bead; this.displayBigRoad = roadsData.big;
      
      // 智能滚动
      let lastValidColIndex = 0;
      for (let c = roadsData.big.length - 1; c >= 0; c--) {
        if (roadsData.big[c][0].winner !== 'empty') { lastValidColIndex = c; break; }
      }
      this.$nextTick(() => { 
        if(this.$refs.roadsScroll) {
          const el = this.$refs.roadsScroll;
          const cols = el.querySelectorAll('.bigroad-column-unit');
          if (cols[lastValidColIndex]) {
            cols[lastValidColIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
          }
        }
      });
    },

    // 路单生成算法
    generatePureMacauRoads(historyArray) {
      let beadMatrix = []; let bCol = [];
      for(let i=0; i<historyArray.length; i++) { bCol.push(historyArray[i]); if(bCol.length === 6) { beadMatrix.push(bCol); bCol = []; } }
      if(bCol.length > 0) { while(bCol.length < 6) bCol.push('empty'); beadMatrix.push(bCol); }
      while(beadMatrix.length < 20) { beadMatrix.push(['empty','empty','empty','empty','empty','empty']); }

      let bigMatrix = [];
      const createCol = () => { let col = []; for(let i=0; i<6; i++) col.push({ winner: 'empty', hasTie: false }); return col; };
      bigMatrix.push(createCol());
      let currentC = 0; let currentR = 0; let lastWin = null; let streakStartCol = 0;
      
      for (let i = 0; i < historyArray.length; i++) {
        let res = historyArray[i];
        if (res === 'tie') {
          if (lastWin === null) bigMatrix[currentC][currentR] = { winner: 'tie', hasTie: true };
          else bigMatrix[currentC][currentR].hasTie = true;
          continue;
        }
        if (lastWin === null) { 
          bigMatrix[currentC][currentR].winner = res; lastWin = res; streakStartCol = currentC; continue; 
        }
        if (res === lastWin) {
          if (currentR + 1 < 6 && bigMatrix[currentC][currentR + 1].winner === 'empty') { currentR++; } 
          else { currentC++; while(currentC >= bigMatrix.length) bigMatrix.push(createCol()); }
          bigMatrix[currentC][currentR].winner = res;
        } else {
          currentC = streakStartCol + 1; currentR = 0;
          while(currentC >= bigMatrix.length) bigMatrix.push(createCol());
          while (bigMatrix[currentC][currentR].winner !== 'empty') { currentC++; if (currentC >= bigMatrix.length) bigMatrix.push(createCol()); }
          bigMatrix[currentC][currentR].winner = res; lastWin = res; streakStartCol = currentC;
        }
      }
      while(bigMatrix.length < 40) bigMatrix.push(createCol());
      return { bead: beadMatrix, big: bigMatrix };
    }
  }
}).mount('#app');
</script>
</body>
</html>
